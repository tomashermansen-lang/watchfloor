phases:
  - id: foundation
    name: Foundation
    overview_summary: Negative coverage.
    sequencing_rationale: Path traversal in qualified paths must be rejected regardless of os.path.normpath behavior; the validator owns the security boundary.
    tasks:
      - id: traversal-task
        name: Traversal task
        task_type: development
        status: pending
        what: This task is sufficiently long but its qualified path uses .. segments that resolve outside the dotfiles test_target root which the validator must reject.
        why: Path traversal in YAML where blocks would let a producer escape the trust boundary by hiding a path resolution that lands on a credential file or shell config outside the project.
        where:
          modify:
            - "dotfiles:../../../etc/passwd"
        acceptance:
          - When validate-plan.py runs, the system shall exit 1 with a path-traversal error.
        prompt: traversal
