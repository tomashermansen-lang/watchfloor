    name: Foundation
    overview_summary: Negative coverage.
    sequencing_rationale: Done tasks must point at real artefacts; missing files indicate the task lied about completion.
    tasks:
      - id: done-task
        name: Done task
        task_type: development
        status: done
        what: This task claims status done but its artifact_refs.requirements_path points at a file that does not exist, triggering R21.
        why: Path existence checks for done tasks are the basis of artefact integrity; without them the YAML graph would diverge from the filesystem.
        where:
          modify:
