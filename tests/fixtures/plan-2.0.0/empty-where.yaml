phases:
  - id: foundation
    name: Foundation
    overview_summary: Negative coverage.
    sequencing_rationale: A pending task with no where[] entry cannot be implemented; the validator must reject it before it propagates downstream.
    tasks:
      - id: empty-task
        name: Empty where
        task_type: development
        status: pending
        what: This task is sufficiently long but its where modify create and delete arrays are all empty which the R17 rule rejects for pending tasks.
        why: A pending task must declare at least one path in where.modify create or delete so the planner has committed to where the work lands; empty where blocks are a producer-quality smell.
        where:
          modify: []
          create: []
          delete: []
        acceptance:
          - When validate-plan.py runs, the system shall exit 1 with an empty-where error.
        prompt: empty
