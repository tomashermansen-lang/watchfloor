        why: Task-b deliberately matches a 60-character window of task-a's what so the duplication detector can prove it catches copy-paste bodies between tasks.
        where:
          modify:
            - claude/tools/y.py
        acceptance:
          - When validate-plan.py runs, the system shall exit 1 with a duplication error referencing task-a or task-b.
